<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>04-03-26(2)</title>
  <style>
    body {
      font-family: Times New Roman, serif;
      font-size: 14px;
      background: #fff;
      color: #000;
      margin: 20px 30px;
      height: 100vh;
    }

    .title {
      font-weight: bold;
      font-size: 25px;
      margin-bottom: 14px;
    margin-left: 300px;
    }

    form {
      display: flex;
      gap: 60px;
      justify-content: center;
      height: 90vh;
      margin: 50px 0;
      width: 100%;
    }

    .forms {
      display: flex;
      flex-direction: column;
    }

    .forms h2 {
      font-size: 25px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 16px;
    }

    .forms h3 {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .input {
      display: flex;
      margin-bottom: 10px;
      gap: 10px;
      width: 390px;
    }

    .input label {
      width: 100px;
      padding-top: 3px;
      font-size: 18px;
      flex-shrink: 0;
    }

    .req {
      color: red;
    }

    .input input[type="text"] {
      width: 300px;
      height: 40px;
      border: 2px solid #999;
      font-size: 13px;
      padding: 5px;
    }

    .input textarea {
      width: 300px;
      height: 170px;
      border: 2px solid #999;
      font-size: 13px;
      padding: 5px;
      resize: vertical;
    }

    .opinion-textarea {
      height: 190px !important;
    }

    .button {
      margin-top: 8px;
      padding-left: 78px;
      margin-left: 30px;
    }

    .button button {
      padding: 7px 14px;
      font-size: 13px;
      background: #ececec;
      border: 1px solid #999;
      cursor: pointer;
    }

    .button button:hover {
      background: #ddd;
    }
  </style>
</head>
<body>

  <p class="title">Bit Repository contact form</p>

  <form>

  
    <div class="forms">
      <h2>Contact Us</h2>

      <div class="input">
        <label>Name <span class="req">*</span></label>
        <input type="text" name="name" />
      </div>

      <div class="input">
        <label>E-Mail <span class="req">*</span></label>
        <input type="text" name="email" />
      </div>

      <div class="input">
        <label>Subject</label>
        <input type="text" name="subject" />
      </div>

      <div class="input">
        <label>Comments <span class="req">*</span></label>
        <textarea name="comments"></textarea>
      </div>

      <div class="button">
        <button type="submit">Send Message</button>
      </div>
    </div>
    <div class="forms">
      <h3>What do you think about this website?</h3>

      <div class="input">
        <label>Name <span class="req">*</span></label>
        <input type="text" name="opinion_name" />
      </div>

      <div class="input">
        <label>Opinion <span class="req">*</span></label>
        <textarea name="opinion" class="opinion-textarea"></textarea>
      </div>

      <div class="button">
        <button type="submit">Submit</button>
      </div>
    </div>

  </form>

</body>
</html>
